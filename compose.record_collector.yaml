name: maistats-record-collector

services:
  maistats-record-collector:
    image: ghcr.io/minty99/maistats-record-collector:latest
    container_name: maistats-record-collector
    environment:
      SEGA_ID: ${SEGA_ID}
      SEGA_PASSWORD: ${SEGA_PASSWORD}
      RECORD_COLLECTOR_PORT: ${RECORD_COLLECTOR_PORT:-3000}
      DATA_DIR: /app/data
      DATABASE_URL: sqlite:/app/data/records.sqlite3
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${RECORD_COLLECTOR_PORT:-3000}/health"]
      interval: 10m
      timeout: 10s
      retries: 2
      start_period: 10s

