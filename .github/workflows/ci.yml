name: CI

on:
  pull_request:
    paths:
      - .github/workflows/ci.yml
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - crates/**
      - maistats-discord-bot/**
      - maistats-record-collector/**
      - maistats-song-info/**
      - tests/**
  push:
    branches: [main]
    paths:
      - .github/workflows/ci.yml
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - crates/**
      - maistats-discord-bot/**
      - maistats-record-collector/**
      - maistats-song-info/**
      - tests/**

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --all -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test
