name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/build-and-push.yml
      - .dockerignore
      - Dockerfile
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - .env.example
      - crates/**
      - maistats-song-info/**
      - maistats-record-collector/**
      - maistats-discord-bot/**
  workflow_dispatch:  # 수동 트리거 허용

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      # --- maistats-song-info ---
      - name: Build and push maistats-song-info
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: maistats-song-info
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/maistats-song-info:sha-${{ steps.sha.outputs.short }}
            ${{ env.IMAGE_PREFIX }}/maistats-song-info:latest
          cache-from: type=gha,scope=maistats-song-info
          cache-to: type=gha,mode=max,scope=maistats-song-info

      # --- maistats-record-collector ---
      - name: Build and push maistats-record-collector
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: maistats-record-collector
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/maistats-record-collector:sha-${{ steps.sha.outputs.short }}
            ${{ env.IMAGE_PREFIX }}/maistats-record-collector:latest
          cache-from: type=gha,scope=maistats-record-collector
          cache-to: type=gha,mode=max,scope=maistats-record-collector

      # --- maistats-discord-bot ---
      - name: Build and push maistats-discord-bot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: maistats-discord-bot
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/maistats-discord-bot:sha-${{ steps.sha.outputs.short }}
            ${{ env.IMAGE_PREFIX }}/maistats-discord-bot:latest
          cache-from: type=gha,scope=maistats-discord-bot
          cache-to: type=gha,mode=max,scope=maistats-discord-bot
