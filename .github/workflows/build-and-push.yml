name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:  # 수동 트리거 허용

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      # --- maimai-song-info-server ---
      - name: Build and push maimai-song-info-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: maimai-song-info
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/maimai-song-info-server:sha-${{ steps.sha.outputs.short }}
            ${{ env.IMAGE_PREFIX }}/maimai-song-info-server:latest
          cache-from: type=gha,scope=maimai-song-info
          cache-to: type=gha,mode=max,scope=maimai-song-info

      # --- maimai-record-collector-server ---
      - name: Build and push maimai-record-collector-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: maimai-record-collector-server
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/maimai-record-collector-server:sha-${{ steps.sha.outputs.short }}
            ${{ env.IMAGE_PREFIX }}/maimai-record-collector-server:latest
          cache-from: type=gha,scope=maimai-record-collector
          cache-to: type=gha,mode=max,scope=maimai-record-collector

      # --- maimai-personal-discord-bot ---
      - name: Build and push maimai-personal-discord-bot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: maimai-personal-discord-bot
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/maimai-personal-discord-bot:sha-${{ steps.sha.outputs.short }}
            ${{ env.IMAGE_PREFIX }}/maimai-personal-discord-bot:latest
          cache-from: type=gha,scope=maimai-discord-bot
          cache-to: type=gha,mode=max,scope=maimai-discord-bot
