name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/build-and-push.yml
      - .dockerignore
      - Dockerfile
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - .env.example
      - crates/**
      - maistats-record-collector/**
      - maistats-discord-bot/**
      - scripts/**
  workflow_dispatch:  # 수동 트리거 허용

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-native:
    name: Build ${{ matrix.image_name }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: maistats-record-collector
            target: maistats-record-collector
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image_name: maistats-record-collector
            target: maistats-record-collector
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - image_name: maistats-discord-bot
            target: maistats-discord-bot
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          # - image_name: maistats-discord-bot
          #   target: maistats-discord-bot
          #   arch: amd64
          #   platform: linux/amd64
          #   runner: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.image_name }} (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image_name }}:sha-${{ steps.sha.outputs.short }}-${{ matrix.arch }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image_name }}:latest-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.image_name }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}-${{ matrix.arch }}

  publish-manifest:
    name: Publish ${{ matrix.image_name }} manifest
    runs-on: ubuntu-latest
    needs:
      - build-native
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: maistats-record-collector
          - image_name: maistats-discord-bot
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Publish ${{ matrix.image_name }} manifest
        run: |
          if [ "${{ matrix.image_name }}" = "maistats-record-collector" ]; then
            source_tags="
              ${{ env.IMAGE_PREFIX }}/${{ matrix.image_name }}:sha-${{ steps.sha.outputs.short }}-amd64
              ${{ env.IMAGE_PREFIX }}/${{ matrix.image_name }}:sha-${{ steps.sha.outputs.short }}-arm64
            "
          else
            source_tags="
              ${{ env.IMAGE_PREFIX }}/${{ matrix.image_name }}:sha-${{ steps.sha.outputs.short }}-arm64
            "
          fi

          docker buildx imagetools create \
            --tag ${{ env.IMAGE_PREFIX }}/${{ matrix.image_name }}:sha-${{ steps.sha.outputs.short }} \
            --tag ${{ env.IMAGE_PREFIX }}/${{ matrix.image_name }}:latest \
            ${source_tags}
