name: Song Database

on:
  pull_request:
    paths:
      - .github/workflows/song-database.yml
      - .github/scripts/upload-song-database.sh
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - .env.example
      - crates/**
      - maistats-song-info/**
  push:
    branches: [main]
    paths:
      - .github/workflows/song-database.yml
      - .github/scripts/upload-song-database.sh
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - .env.example
      - crates/**
      - maistats-song-info/**
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

jobs:
  validate:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    env:
      HAS_GENERATE_SECRETS: ${{ secrets.MAIMAI_INTL_SEGA_ID != '' && secrets.MAIMAI_INTL_SEGA_PASSWORD != '' && secrets.USER_AGENT != '' }}

    steps:
      - name: Skip when required secrets are missing
        if: ${{ env.HAS_GENERATE_SECRETS != 'true' }}
        run: echo "Skipping validation because required song database secrets are not configured."

      - name: Checkout
        if: ${{ env.HAS_GENERATE_SECRETS == 'true' }}
        uses: actions/checkout@v4

      - name: Set up Rust
        if: ${{ env.HAS_GENERATE_SECRETS == 'true' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        if: ${{ env.HAS_GENERATE_SECRETS == 'true' }}
        uses: Swatinem/rust-cache@v2

      - name: Generate song database
        if: ${{ env.HAS_GENERATE_SECRETS == 'true' }}
        env:
          SONG_DATA_PATH: /tmp/song_data
          MAIMAI_INTL_SEGA_ID: ${{ secrets.MAIMAI_INTL_SEGA_ID }}
          MAIMAI_INTL_SEGA_PASSWORD: ${{ secrets.MAIMAI_INTL_SEGA_PASSWORD }}
          USER_AGENT: ${{ secrets.USER_AGENT }}
        run: cargo run -p maistats-song-info

      - name: Validate generated artifacts
        if: ${{ env.HAS_GENERATE_SECRETS == 'true' }}
        env:
          SONG_DATA_PATH: /tmp/song_data
        run: |
          test -f "${SONG_DATA_PATH}/data.json"
          test -d "${SONG_DATA_PATH}/cover"

  publish:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      HAS_PUBLISH_SECRETS: ${{ secrets.MAIMAI_INTL_SEGA_ID != '' && secrets.MAIMAI_INTL_SEGA_PASSWORD != '' && secrets.USER_AGENT != '' && secrets.R2_BUCKET_NAME != '' && secrets.R2_ENDPOINT != '' && secrets.R2_ACCESS_KEY_ID != '' && secrets.R2_SECRET_ACCESS_KEY != '' && secrets.R2_PUBLIC_BASE_URL != '' }}

    steps:
      - name: Skip when required secrets are missing
        if: ${{ env.HAS_PUBLISH_SECRETS != 'true' }}
        run: echo "Skipping publish because required song database secrets are not configured."

      - name: Checkout
        if: ${{ env.HAS_PUBLISH_SECRETS == 'true' }}
        uses: actions/checkout@v4

      - name: Set up Rust
        if: ${{ env.HAS_PUBLISH_SECRETS == 'true' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        if: ${{ env.HAS_PUBLISH_SECRETS == 'true' }}
        uses: Swatinem/rust-cache@v2

      - name: Install AWS CLI
        if: ${{ env.HAS_PUBLISH_SECRETS == 'true' }}
        run: |
          arch="$(uname -m)"
          case "${arch}" in
            x86_64) awscli_arch="x86_64" ;;
            aarch64|arm64) awscli_arch="aarch64" ;;
            *)
              echo "Unsupported architecture for AWS CLI installer: ${arch}" >&2
              exit 1
              ;;
          esac

          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-${awscli_arch}.zip" -o "${workdir}/awscliv2.zip"
          unzip -q "${workdir}/awscliv2.zip" -d "${workdir}"
          sudo "${workdir}/aws/install" --update
          aws --version

      - name: Download existing covers from R2
        if: ${{ env.HAS_PUBLISH_SECRETS == 'true' }}
        env:
          SONG_DATA_PATH: /tmp/song_data
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p "${SONG_DATA_PATH}/cover"
          aws s3 sync \
            "s3://${R2_BUCKET_NAME}/cover/" \
            "${SONG_DATA_PATH}/cover/" \
            --endpoint-url "${R2_ENDPOINT}"

      - name: Generate song database
        if: ${{ env.HAS_PUBLISH_SECRETS == 'true' }}
        env:
          SONG_DATA_PATH: /tmp/song_data
          MAIMAI_INTL_SEGA_ID: ${{ secrets.MAIMAI_INTL_SEGA_ID }}
          MAIMAI_INTL_SEGA_PASSWORD: ${{ secrets.MAIMAI_INTL_SEGA_PASSWORD }}
          USER_AGENT: ${{ secrets.USER_AGENT }}
        run: cargo run -p maistats-song-info

      - name: Upload to R2
        if: ${{ env.HAS_PUBLISH_SECRETS == 'true' }}
        env:
          SONG_DATA_PATH: /tmp/song_data
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: bash ./.github/scripts/upload-song-database.sh

      - name: Smoke check public data.json
        if: ${{ env.HAS_PUBLISH_SECRETS == 'true' }}
        env:
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: curl -fsSL "${R2_PUBLIC_BASE_URL}/data.json" > /dev/null
