name: Validate maistats

on:
  pull_request:
    paths:
      - .github/workflows/maistats.yml
      - package.json
      - package-lock.json
      - apps/maistats/**
  push:
    branches: [main]
    paths:
      - .github/workflows/maistats.yml
      - package.json
      - package-lock.json
      - apps/maistats/**

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build maistats
        run: npm run build --workspace apps/maistats
